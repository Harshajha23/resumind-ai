<!DOCTYPE html>
<html>
<head>
    <title>Resume Analyzer</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #eef2f3, #dfe9f3);
            padding: 30px;
        }

        .container {
            max-width: 650px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 10px;
            margin-top: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        input[type="file"] {
            margin-top: 10px;
        }

        button {
            margin-top: 15px;
            padding: 12px;
            width: 100%;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #0056b3;
        }

        .result-box {
            margin-top: 20px;
            padding: 15px;
            background: #f9fafb;
            border-radius: 8px;
            max-height: 300px;
            overflow-y: auto;
        }

        .score {
            font-size: 22px;
            font-weight: bold;
            color: green;
        }

        ul {
            padding-left: 20px;
        }

        .matched li {
            color: green;
        }

        .missing li {
            color: red;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Resume Analyzer</h1>

    <input type="file" id="file">

    <textarea id="jd" placeholder="Enter Job Description..."></textarea>

    <button onclick="analyzeResume()">Analyze Resume</button>

    <div class="result-box">

        <p class="score">ATS Score: <span id="score">-</span></p>

        <h3>Matched Skills:</h3>
        <ul id="matched" class="matched"></ul>

        <h3>Missing Skills:</h3>
        <ul id="missing" class="missing"></ul>

    </div>

</div>

<script>

// Format skill nicely
function formatSkill(skill) {
    return skill.charAt(0).toUpperCase() + skill.slice(1).toLowerCase();
}

async function analyzeResume() {

    const fileInput = document.getElementById("file");
    const jd = document.getElementById("jd").value;

    if (!fileInput.files.length) {
        alert("Please upload a resume");
        return;
    }

    if (!jd.trim()) {
        alert("Please enter job description");
        return;
    }

    let formData = new FormData();
    formData.append("file", fileInput.files[0]);
    formData.append("job_description", jd);

    try {
        let response = await fetch("/upload/", {
            method: "POST",
            body: formData
        });

        // 🔥 IMPORTANT FIX
        if (!response.ok) {
            throw new Error("Server error: " + response.status);
        }

        let data = await response.json();

        console.log("Response:", data); // debug

        if (data.error) {
            alert(data.error);
            return;
        }

        // ATS Score
        document.getElementById("score").innerText = data.ats_score + "%";

        // Matched Skills
        let matchedList = document.getElementById("matched");
        matchedList.innerHTML = "";

        if (!data.matched_skills || data.matched_skills.length === 0) {
            matchedList.innerHTML = "<li>None</li>";
        } else {
            data.matched_skills.forEach(skill => {
                matchedList.innerHTML += `<li>${formatSkill(skill)}</li>`;
            });
        }

        // Missing Skills
        let missingList = document.getElementById("missing");
        missingList.innerHTML = "";

        if (!data.missing_skills || data.missing_skills.length === 0) {
            missingList.innerHTML = "<li>None</li>";
        } else {
            data.missing_skills.forEach(skill => {
                missingList.innerHTML += `<li>${formatSkill(skill)}</li>`;
            });
        }

    } catch (error) {
        console.error(error);
        alert("Server not responding. Check Django server.");
    }
}

</script>

</body>
</html>
